spring:
  datasource:
    driver-class-name:
      org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/udemyDb
    username: postgres
    password: root123
  jpa:
    hibernate:
     ddl-auto: create
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        enable_lazy_load_no_trans: true
  sql:
    init:
      mode: always
  main:
    allow-circular-references: true
